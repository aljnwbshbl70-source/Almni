<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لديك رسالة جديدة 💌</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff4d79;
            --bg: #1a1a2e;
        }

        body {
            margin: 0; padding: 0; background: var(--bg);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%; max-width: 400px; text-align: center;
            background: rgba(255,255,255,0.05); padding: 30px;
            border-radius: 30px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* قفل المتابعة */
        #lock-screen { display: block; }
        #chat-screen { display: none; }

        .lock-icon { font-size: 50px; margin-bottom: 20px; color: #ffd700; }
        
        .btn-follow {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white; text-decoration: none; padding: 12px 25px;
            border-radius: 50px; display: inline-block; font-weight: bold; margin-bottom: 15px;
        }

        .btn-verify {
            background: #2ecc71; color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* المحادثة */
        .char-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--primary); margin-bottom: 20px; }
        .bubble {
            background: white; color: #333; padding: 20px; border-radius: 20px 20px 0 20px;
            font-size: 1.1rem; margin-bottom: 25px; line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); position: relative;
        }

        .btn-next-chat {
            background: var(--primary); color: white; border: none;
            padding: 10px 30px; border-radius: 50px; cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    
    <div id="lock-screen" class="animate__animated animate__fadeIn">
        <div class="lock-icon">🔒</div>
        <h2>الرسالة مقفلة!</h2>
        <p>تابع صاحب الموقع لفتح قفل الرسالة</p>
        <a href="https://www.instagram.com/omar7ym?igsh=MTZieWE2dHRjZHZ6aw==" target="_blank" class="btn-follow" onclick="markFollowed()">
            📸 تابع الحساب الآن
        </a>
        <button class="btn-verify" id="verifyBtn" onclick="unlock()">تحقق من المتابعة ✅</button>
    </div>

    <div id="chat-screen" class="animate__animated animate__zoomIn">
        <img src="" id="displayCharImg" class="char-img">
        <div class="bubble" id="chatText">جاري تحميل الرسالة...</div>
        <button class="btn-next-chat" id="nextChatBtn" onclick="runChat()">استمرار ✨</button>
        <iframe id="musicPlayer" width="0" height="0" frameborder="0" allow="autoplay"></iframe>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3UW1QxQx3VeYldsHnVtSGAQOxZZ9FOOU",
        authDomain: "kalmni-b7561.firebaseapp.com",
        projectId: "kalmni-b7561",
        storageBucket: "kalmni-b7561.firebasestorage.app",
        messagingSenderId: "852080036145",
        appId: "1:852080036145:web:216a00ee861a0e534bc810"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let messageData = null;
    let chatIndex = 0;
    let isFollowed = false;

    // 1. جلب البيانات من الرابط
    async function loadData() {
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        if (!docId) {
            document.body.innerHTML = "<h1>الرابط غير صالح ❌</h1>";
            return;
        }

        const docRef = doc(db, "messages", docId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            messageData = docSnap.data();
            document.getElementById('displayCharImg').src = messageData.charImg;
        } else {
            alert("الرسالة غير موجودة!");
        }
    }

    window.markFollowed = () => { isFollowed = true; };

    window.unlock = () => {
        if (!isFollowed) {
            alert("يرجى الضغط على رابط المتابعة أولاً!");
            return;
        }
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'block';
        startConversation();
    };

    function startConversation() {
        // تشغيل الأغنية إذا وجدت
        if(messageData.song) {
            let songId = messageData.song.split('v=')[1] || messageData.song.split('/').pop();
            document.getElementById('musicPlayer').src = `https://www.youtube.com/embed/${songId}?autoplay=1`;
        }
        runChat();
    }

    window.runChat = () => {
        const steps = [
            `أهلاً يا ${messageData.receiver}.. عندي لك رسالة من ${messageData.sender} 🎀`,
            `يقول لك إنه اختار نموذج "${messageData.template}" خصيصاً لك..`,
            `${messageData.message || "إنت شخص غالي جداً عليه وما يبي يخسرك.. ❤️"}`
        ];

        if (chatIndex < steps.length) {
            document.getElementById('chatText').innerText = steps[chatIndex];
            chatIndex++;
        } else {
            document.getElementById('chatText').innerText = "انتهت الرسالة.. أتمنى لك يوماً سعيداً ✨";
            document.getElementById('nextChatBtn').classList.add('hidden');
        }
    };

    loadData();
</script>

</body>
</html>
