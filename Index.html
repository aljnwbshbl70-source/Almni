<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسألني - Ask Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #ff4d79;
            --secondary: #7a003c;
            --dark-bg: #121212;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 90%; max-width: 450px;
            background: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; position: relative;
        }

        .step { display: none; }
        .step.active { display: block; }

        .progress-bar {
            position: absolute; top: 0; left: 0; height: 6px;
            background: var(--primary); transition: 0.5s; border-radius: 25px 25px 0 0;
        }

        h2 { font-size: 1.4rem; margin-bottom: 20px; color: #ffcae0; }
        
        /* Grid للشخصيات والنماذج */
        .selection-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;
        }

        .item-card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }

        .item-card:hover, .item-card.selected {
            border-color: var(--primary); background: rgba(255,77,121,0.2);
        }

        .item-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }

        input, select, textarea {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: rgba(0,0,0,0.4); color: white; margin-bottom: 15px;
            box-sizing: border-box; outline: none; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            background: linear-gradient(90deg, #ff4d79, #ff1a53);
            color: white; border: none; padding: 15px; border-radius: 50px;
            width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer { font-size: 0.7rem; margin-top: 20px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <div id="progress" class="progress-bar" style="width: 10%;"></div>

    <div id="step1" class="step active">
        <h2>🧸 اختر الشخصية</h2>
        <div class="selection-grid">
            <div class="item-card" onclick="selectItem('char', 'باتركب', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf_xN66oY6O2p5-E9e_qH_fT1O-D-7E8eU4Q&s')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSf_xN66oY6O2p5-E9e_qH_fT1O-D-7E8eU4Q&s"><p>باتركب</p>
            </div>
            <div class="item-card" onclick="selectItem('char', 'بابلز', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzYvA6-S9_vW9iH8uXoFk1X0wz5qY5fE9e_A&s')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzYvA6-S9_vW9iH8uXoFk1X0wz5qY5fE9e_A&s"><p>بابلز</p>
            </div>
            <div class="item-card" onclick="selectItem('char', 'ماشا', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz-Y5fE9e_A-S9_vW9iH8uXoFk1X0wz5qY&s')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz-Y5fE9e_A-S9_vW9iH8uXoFk1X0wz5qY&s"><p>ماشا</p>
            </div>
            <div class="item-card" onclick="selectItem('char', 'هيلو كيتي', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-Y5fE9e_A-S9_vW9iH8uXoFk1X0wz5qY&s')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-Y5fE9e_A-S9_vW9iH8uXoFk1X0wz5qY&s"><p>هيلو كيتي</p>
            </div>
        </div>
        <button class="btn" onclick="goToStep(2)">التالي</button>
    </div>

    <div id="step2" class="step">
        <h2>📑 اختر نموذج الرسالة</h2>
        <select id="template">
            <option value="حب حنون">😊 حب حنون</option>
            <option value="صداقة">🤝 صداقة</option>
            <option value="اشتياق">😢 اشتياق</option>
            <option value="اعتذار">🥺 اعتذار ومصالحة</option>
            <option value="عاصفة">🌪️ عاصفة</option>
        </select>
        <button class="btn" onclick="goToStep(3)">التالي</button>
    </div>

    <div id="step3" class="step">
        <h2>👤 معلوماتك ومعلومات الطرف الآخر</h2>
        <input type="text" id="senderName" placeholder="اسمك (مثلاً: حسين)">
        <input type="text" id="receiverName" placeholder="اسم حبيبك / صديقك">
        <select id="relation">
            <option value="حبيب/ـة">❤️ حبيب/ـة</option>
            <option value="صديق/ـة">🤝 صديق/ـة</option>
        </select>
        <button class="btn" onclick="goToStep(4)">التالي</button>
    </div>

    <div id="step4" class="step">
        <h2>✍️ رسالتك</h2>
        <textarea id="customMsg" placeholder="اكتب رسالتك هنا (اختياري)"></textarea>
        <input type="text" id="songUrl" placeholder="رابط يوتيوب أو ساوندكلاود">
        <button class="btn" id="createBtn" onclick="createMessage()">إنشاء الرسالة 💌</button>
    </div>

    <div id="step5" class="step">
        <img src="https://api.iconify.design/noto:party-popper.svg" width="80">
        <h2>تم إنشاء رسالتك بنجاح!</h2>
        <input type="text" id="finalLink" readonly>
        <button class="btn" onclick="copyLink()">📋 نسخ الرابط</button>
        <button class="btn" style="background: #333;" onclick="location.reload()">✨ إنشاء رسالة جديدة</button>
    </div>

    <div class="footer">Soviet Rights - حقوق سوفييت © 2026</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3UW1QxQx3VeYldsHnVtSGAQOxZZ9FOOU",
        authDomain: "kalmni-b7561.firebaseapp.com",
        projectId: "kalmni-b7561",
        storageBucket: "kalmni-b7561.firebasestorage.app",
        messagingSenderId: "852080036145",
        appId: "1:852080036145:web:216a00ee861a0e534bc810"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // متغيرات الاختيارات
    let selectedChar = "";
    let selectedCharImg = "";

    window.selectItem = (type, name, img) => {
        selectedChar = name;
        selectedCharImg = img;
        document.querySelectorAll('.item-card').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
    };

    window.goToStep = (n) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        document.getElementById('progress').style.width = (n * 20) + '%';
    };

    window.createMessage = async () => {
        const btn = document.getElementById('createBtn');
        btn.disabled = true;
        btn.innerText = "جاري الإنشاء...";

        const data = {
            char: selectedChar,
            charImg: selectedCharImg,
            template: document.getElementById('template').value,
            sender: document.getElementById('senderName').value,
            receiver: document.getElementById('receiverName').value,
            relation: document.getElementById('relation').value,
            message: document.getElementById('customMsg').value,
            song: document.getElementById('songUrl').value,
            createdAt: new Date()
        };

        try {
            const docRef = await addDoc(collection(db, "messages"), data);
            // هنا ننشئ الرابط (استخدمت Netlify كمثال للرابط)
            const myUrl = window.location.origin + "/view.html?id=" + docRef.id;
            document.getElementById('finalLink').value = myUrl;
            goToStep(5);
        } catch (e) {
            alert("خطأ في الاتصال بفايربيس: " + e.message);
            btn.disabled = false;
        }
    };

    window.copyLink = () => {
        const linkInput = document.getElementById('finalLink');
        linkInput.select();
        document.execCommand('copy');
        alert("تم نسخ الرابط بنجاح!");
    };
</script>

</body>
</html>
